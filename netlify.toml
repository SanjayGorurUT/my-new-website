[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/projects/programming-intro"
  to = "/projects/programming-intro/"
  status = 301

[[redirects]]
  from = "/projects/group/ultimate-guitar-song-decomposition"
  to = "/projects/group/ultimate-guitar-song-decomposition/"
  status = 301

# Use Node 16 which doesn't require --openssl-legacy-provider
# This avoids the NODE_OPTIONS restriction on Netlify
[build.environment]
  NODE_VERSION = "16"

# Alternative: If you need Node 18+, you can try setting NODE_OPTIONS
# but Netlify may block it for security reasons

